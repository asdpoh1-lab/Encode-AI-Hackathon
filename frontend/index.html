<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Olympics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #f5c542;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #intro {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #000;
      transition: opacity 1.2s ease;
    }
    #intro.fade-out { opacity: 0; pointer-events: none; }

    #bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.3) 0%, rgba(0,0,0,.15) 50%, rgba(0,0,0,.7) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 80px;
    }

    .overlay-title {
      font-family: var(--font-head);
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: -.02em;
      text-align: center;
      line-height: 1.05;
      text-shadow: 0 2px 40px rgba(0,0,0,.6);
      opacity: 0;
      animation: titleIn 1s ease 0.5s both;
    }

    .overlay-sub {
      font-family: var(--font-mono);
      font-size: clamp(.85rem, 2vw, 1.1rem);
      color: rgba(255,255,255,.7);
      margin-top: 12px;
      letter-spacing: .04em;
      text-align: center;
      opacity: 0;
      animation: titleIn 1s ease 1s both;
    }

    .enter-btn {
      margin-top: 40px;
      background: var(--gold);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.1rem;
      padding: 16px 48px;
      cursor: pointer;
      letter-spacing: .02em;
      opacity: 0;
      animation: titleIn 1s ease 1.5s both;
      transition: transform .15s;
    }
    .enter-btn:hover { transform: translateY(-2px); }
    .enter-btn:active { transform: translateY(0); }

    .skip-link {
      position: absolute;
      bottom: 24px;
      right: 32px;
      font-family: var(--font-mono);
      font-size: .75rem;
      color: rgba(255,255,255,.4);
      cursor: pointer;
      border: none;
      background: none;
      text-decoration: underline;
      opacity: 0;
      animation: titleIn .8s ease 2s both;
    }
    .skip-link:hover { color: rgba(255,255,255,.7); }

    @keyframes titleIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="intro">
    <video id="bg-video" autoplay muted playsinline>
      <source src="Roman_Colosseum_Competition_Video.mp4" type="video/mp4" />
    </video>

    <div class="video-overlay">
      <div class="overlay-title">Agent Olympics</div>
      <div class="overlay-sub">Which AI wins your question?</div>
      <button class="enter-btn" id="enterBtn">⚡ Enter the Arena</button>
    </div>

    <button class="skip-link" id="skipBtn">skip intro</button>
  </div>

<script>
  const video = document.getElementById('bg-video');

  function goToArena() {
    const intro = document.getElementById('intro');
    intro.classList.add('fade-out');
    setTimeout(() => {
      window.location.href = '/arena.html';
    }, 1200);
  }

  document.getElementById('enterBtn').onclick = goToArena;
  document.getElementById('skipBtn').onclick  = goToArena;
  video.addEventListener('ended', goToArena);
  video.addEventListener('error', () => {
    document.querySelector('.overlay-title').style.opacity = '1';
    document.querySelector('.overlay-sub').style.opacity = '1';
    document.querySelector('.enter-btn').style.opacity = '1';
  });
</script>
</body>
</html>
